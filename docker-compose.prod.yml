services:
  caddy:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: qqueue-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - qqueue-caddy-data:/data
      - qqueue-caddy-config:/config
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qqueue-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: ${PROD_DATABASE_URL:-postgresql://qqueue:${POSTGRES_PASSWORD}@postgres:5432/qqueue}
      REDIS_HOST: ${PROD_REDIS_HOST:-redis}
      REDIS_PORT: ${PROD_REDIS_PORT:-6379}
      WEB_ORIGIN: https://${DOMAIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: qqueue-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      REDIS_HOST: ${PROD_REDIS_HOST:-redis}
      REDIS_PORT: ${PROD_REDIS_PORT:-6379}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qqueue-migrate
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: ${PROD_DATABASE_URL:-postgresql://qqueue:${POSTGRES_PASSWORD}@postgres:5432/qqueue}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    command:
      [
        "./node_modules/.bin/prisma",
        "migrate",
        "deploy",
        "--schema",
        "apps/api/prisma/schema.prisma"
      ]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: qqueue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qqueue}
    volumes:
      - qqueue-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-qqueue} -d $${POSTGRES_DB:-qqueue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qqueue-redis
    restart: unless-stopped
    volumes:
      - qqueue-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qqueue-caddy-data:
  qqueue-caddy-config:
  qqueue-postgres-data:
  qqueue-redis-data:
