services:
  caddy:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: qqueue-caddy
    restart: unless-stopped
    environment:
      DOMAIN: ${DOMAIN}
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:-${DOMAIN}}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - qqueue-caddy-data:/data
      - qqueue-caddy-config:/config
    depends_on:
      api:
        condition: service_started

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qqueue-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      DATABASE_URL: "${PROD_DATABASE_URL:-postgresql://${POSTGRES_USER:-qqueue}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qqueue}}"
      REDIS_HOST: ${PROD_REDIS_HOST:-redis}
      REDIS_PORT: ${PROD_REDIS_PORT:-6379}
      WEB_ORIGIN: https://${DOMAIN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: https://${DOMAIN}
      PUBLIC_APP_URL: https://${DOMAIN}
      TRACKING_SECRET: ${TRACKING_SECRET}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      # Attachment object storage. Defaults to the bundled MinIO. Set
      # PROD_S3_ENDPOINT plus the S3_* vars to use external object storage.
      S3_ENDPOINT: "${PROD_S3_ENDPOINT-http://minio:9000}"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-qqueue-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-qqueue}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-qqueue-secret}}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      ATTACHMENT_MAX_BYTES: ${ATTACHMENT_MAX_BYTES:-10485760}
      SOFT_BOUNCE_THRESHOLD: ${SOFT_BOUNCE_THRESHOLD:-3}
      SOFT_BOUNCE_WINDOW_DAYS: ${SOFT_BOUNCE_WINDOW_DAYS:-30}
      DEFAULT_DOMAIN_MAX_PER_MINUTE: ${DEFAULT_DOMAIN_MAX_PER_MINUTE:-60}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: qqueue-worker
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: "${PROD_DATABASE_URL:-postgresql://${POSTGRES_USER:-qqueue}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qqueue}}"
      REDIS_HOST: ${PROD_REDIS_HOST:-redis}
      REDIS_PORT: ${PROD_REDIS_PORT:-6379}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: https://${DOMAIN}
      TRACKING_SECRET: ${TRACKING_SECRET}
      S3_ENDPOINT: "${PROD_S3_ENDPOINT-http://minio:9000}"
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_BUCKET: ${S3_BUCKET:-qqueue-attachments}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-qqueue}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-${MINIO_ROOT_PASSWORD:-qqueue-secret}}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE:-true}
      SOFT_BOUNCE_THRESHOLD: ${SOFT_BOUNCE_THRESHOLD:-3}
      SOFT_BOUNCE_WINDOW_DAYS: ${SOFT_BOUNCE_WINDOW_DAYS:-30}
      DEFAULT_DOMAIN_MAX_PER_MINUTE: ${DEFAULT_DOMAIN_MAX_PER_MINUTE:-60}
      INBOX_SYNC_INTERVAL_SECONDS: ${INBOX_SYNC_INTERVAL_SECONDS:-120}
      INBOX_SYNC_MAX_MESSAGES: ${INBOX_SYNC_MAX_MESSAGES:-50}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy

  migrate:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: qqueue-migrate
    restart: "no"
    environment:
      NODE_ENV: production
      DATABASE_URL: "${PROD_DATABASE_URL:-postgresql://${POSTGRES_USER:-qqueue}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-qqueue}}"
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    command:
      [
        "./node_modules/.bin/prisma",
        "migrate",
        "deploy",
        "--schema",
        "apps/api/prisma/schema"
      ]
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: qqueue-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-qqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-qqueue}
    volumes:
      - qqueue-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-qqueue} -d $${POSTGRES_DB:-qqueue}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: qqueue-redis
    restart: unless-stopped
    volumes:
      - qqueue-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Bundled S3-compatible object storage for attachments. Replace by pointing the
  # S3_* vars (on api/worker) at an external S3 provider and removing this block.
  minio:
    image: minio/minio:latest
    container_name: qqueue-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY_ID:-qqueue}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-qqueue-secret}
    volumes:
      - qqueue-minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  qqueue-caddy-data:
  qqueue-caddy-config:
  qqueue-postgres-data:
  qqueue-redis-data:
  qqueue-minio-data:
