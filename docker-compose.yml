services:
  postgres:
    image: postgres:16-alpine
    container_name: qqueue-postgres
    environment:
      POSTGRES_USER: qqueue
      POSTGRES_PASSWORD: qqueue
      POSTGRES_DB: qqueue
    ports:
      - "5432:5432"
    volumes:
      - qqueue-postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: qqueue-redis
    ports:
      - "6379:6379"
    volumes:
      - qqueue-redis-data:/data

  # S3-compatible object storage for email attachments. The host S3 API is on
  # :9100 and the console is on :9101 (matches the default S3_ENDPOINT).
  minio:
    image: minio/minio:latest
    container_name: qqueue-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: qqueue
      MINIO_ROOT_PASSWORD: qqueue-secret
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - qqueue-minio-data:/data

volumes:
  qqueue-postgres-data:
  qqueue-redis-data:
  qqueue-minio-data:
