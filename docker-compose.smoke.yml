services:
  postgres:
    image: postgres:16-alpine
    container_name: qqueue-smoke-postgres
    environment:
      POSTGRES_USER: qqueue
      POSTGRES_PASSWORD: qqueue
      POSTGRES_DB: qqueue
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qqueue -d qqueue"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: qqueue-smoke-redis
    ports:
      - "56379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
