name: Publish SDK

on:
  push:
    tags:
      - qqueue-sdk-v*
  workflow_dispatch:

concurrency:
  group: publish-sdk-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @qqueue/api exec prisma generate

      - name: Verify tag matches SDK version
        if: github.ref_type == 'tag'
        run: |
          VERSION=$(node -p "require('./packages/sdk/package.json').version")
          TAG="${GITHUB_REF_NAME#qqueue-sdk-v}"
          if [ "$TAG" != "$VERSION" ]; then
            echo "Tag qqueue-sdk-v$TAG does not match packages/sdk version $VERSION."
            exit 1
          fi

      - name: Test SDK
        run: pnpm --filter qqueue-sdk test

      - name: Typecheck SDK
        run: pnpm --filter qqueue-sdk typecheck

      - name: Build SDK
        run: pnpm --filter qqueue-sdk build

      - name: Publish SDK to npm
        working-directory: packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
